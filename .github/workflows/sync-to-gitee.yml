name: Sync to Gitee

on:
  push:
    branches: [ custom/main, main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Debug Info
        run: |
          echo "GitHub Owner: ${{ github.repository_owner }}"
          echo "Gitee Target: gxuud/kimi-cli"
          echo "Current branches:"
          git branch -a

      - name: Push to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          # 添加 Gitee 远程仓库（使用 Token）
          echo "🔗 添加 Gitee 远程仓库..."
          git remote add gitee https://oauth2:${GITEE_TOKEN}@gitee.com/gxuud/kimi-cli.git 2>&1 || {
            echo "⚠️ 添加远程仓库失败，可能已存在"
          }
          
          # 显示远程仓库
          echo "📋 远程仓库列表:"
          git remote -v
          
          # 获取所有分支
          echo "📥 获取所有分支..."
          git fetch origin --all 2>&1
          
          # 推送所有分支到 Gitee
          echo "🚀 正在同步分支到 Gitee..."
          git push gitee --all --force 2>&1 || {
            echo "❌ 推送分支失败"
            echo "检查 Token 是否有 projects 权限"
            exit 1
          }
          
          # 推送所有标签
          echo "🏷️  正在同步标签到 Gitee..."
          git push gitee --tags --force 2>&1 || {
            echo "⚠️ 推送标签失败（非致命）"
          }
          
          echo "✅ 同步完成！"

      - name: Verify Sync
        run: |
          echo "🔍 验证 Gitee 仓库..."
          curl -s "https://gitee.com/api/v5/repos/gxuud/kimi-cli/branches" | head -100
